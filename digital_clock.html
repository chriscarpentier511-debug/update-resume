<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <script>\n        function updateClock() {\n            const utc = new Date();\n            const utcHours = utc.getUTCHours();\n            const utcMinutes = utc.getUTCMinutes();\n            const utcSeconds = utc.getUTCSeconds();\n\n            const timezones = {\n                "UTC": `${String(utcHours).padStart(2, '0')}:${String(utcMinutes).padStart(2, '0')}:${String(utcSeconds).padStart(2, '0')}`,\n                "EST": `${String(utcHours - 5).padStart(2, '0')}:${String(utcMinutes).padStart(2, '0')}:${String(utcSeconds).padStart(2, '0')}`,\n                "PST": `${String(utcHours - 8).padStart(2, '0')}:${String(utcMinutes).padStart(2, '0')}:${String(utcSeconds).padStart(2, '0')}`,\n                "CET": `${String(utcHours + 1).padStart(2, '0')}:${String(utcMinutes).padStart(2, '0')}:${String(utcSeconds).padStart(2, '0')}`,\n                "IST": `${String(utcHours + 5).padStart(2, '0')}:${String(utcMinutes).padStart(2, '0')}:${String(utcSeconds).padStart(2, '0')}`\n            };\n\n            document.getElementById('clock').innerHTML = '';\n            for (const [zone, time] of Object.entries(timezones)) {\n                document.getElementById('clock').innerHTML += `<div>${zone}: ${time}</div>`;\n            }\n        }\n\n        setInterval(updateClock, 1000);\n    </script>\n</head>\n<body>\n    <h1>Digital Clock</h1>\n    <div id="clock"></div>\n</body>\n</html>\n
